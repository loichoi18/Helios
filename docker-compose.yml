version: "3.9"

# ── Helios local development stack ────────────────────────────────────────────
# Starts all services + Postgres + Prometheus + Grafana in one command:
#   docker-compose up --build
#
# Ports:
#   5173  → React frontend (Vite dev server)
#   8080  → Metrics service REST API + WebSocket
#   9090  → Prometheus
#   3000  → Grafana
#   9100  → Prometheus exporter (Python)

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       helios
      POSTGRES_USER:     helios
      POSTGRES_PASSWORD: helios
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helios"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Metrics Service (Java) ────────────────────────────────────────────────────
  metrics-service:
    build:
      context: backend/metrics-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST:  postgres
      DB_NAME:  helios
      DB_USER:  helios
      DB_PASS:  helios
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Alerting Service (Java) ───────────────────────────────────────────────────
  alerting-service:
    build:
      context: backend/alerting-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      METRICS_SERVICE_URL:    http://metrics-service:8080
    depends_on:
      metrics-service:
        condition: service_healthy

  # ── Prometheus Exporter (Python) ──────────────────────────────────────────────
  prometheus-exporter:
    build:
      context: sre
      dockerfile: Dockerfile.exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    environment:
      HELIOS_API_URL: http://metrics-service:8080
    depends_on:
      metrics-service:
        condition: service_healthy
    command:
      - python
      - exporter/prometheus_exporter.py
      - --api
      - http://metrics-service:8080
      - --port
      - "9100"
      - --interval
      - "15"

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - prometheus-exporter

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:

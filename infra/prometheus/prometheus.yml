global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: helios
    env:     local

scrape_configs:
  - job_name: helios-metrics-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["metrics-service:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: helios-exporter
    static_configs:
      - targets: ["prometheus-exporter:9100"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
